version: "3.8"

services:
  app:
    build: .
    container_name: node_app
    ports:
      - "8008:8008"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - app_network
    restart: always

  mongo:
    image: mongo:6
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    restart: always

  redis:
    image: redis:latest
    container_name: redis_container
    ports:
      - "6379:6379"
    networks:
      - app_network
    restart: always

volumes:
  mongo_data:


networks:
  app_network:
    driver: bridge
